name: CLI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "aw/**"
      - ".github/workflows/cli.yml"
  pull_request:
    paths:
      - "aw/**"
      - ".github/workflows/cli.yml"

defaults:
  run:
    working-directory: aw

jobs:
  check:
    name: Lint, format, test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.18"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Black
        run: uv run black --check .

      - name: Pytest
        run: uv run pytest
